apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
        - name: react-app
          image: react-devops-app
          imagePullPolicy: Never
          ports:
            - containerPort: 5006
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: react-app-secrets
                  key: GEMINI_API_KEY
            - name: PORT
              value: "5006"
          livenessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 5