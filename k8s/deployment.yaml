apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-component-studio
  namespace: react-studio
  labels:
    app: react-component-studio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-component-studio
  template:
    metadata:
      labels:
        app: react-component-studio
    spec:
      containers:
        - name: web
          image: your-dockerhub-username/react-component-studio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.3.0
          args:
            - -nginx.scrape-uri=http://127.0.0.1/nginx_status
          ports:
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
