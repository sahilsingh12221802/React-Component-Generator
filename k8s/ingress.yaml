apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: react-component-studio
  namespace: react-studio
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: react-studio.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: react-component-studio
                port:
                  number: 80
